name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --bundles dmg
          - platform: windows-latest
            args: --bundles msi

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PortKill ${{ github.ref_name }}
          releaseBody: |
            PortKill ${{ github.ref_name }} — Monitor TCP ports and kill processes from your system tray.

            **Artifacts:**
            - macOS `.dmg` (arm64)
            - Windows `.msi` (x64)

            **macOS:** Right-click → Open on first launch to bypass Gatekeeper (unsigned build).
            **Windows:** Click "More info → Run anyway" to bypass SmartScreen (unsigned build).
          args: ${{ matrix.args }}
