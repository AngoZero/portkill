name: PortKill

options:
  bundleIdPrefix: com.angozero
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  PortKill:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PortKill
        excludes:
          - "Resources/Info.plist"
          - "Resources/PortKill.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.angozero.portkill
        INFOPLIST_FILE: PortKill/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PortKill/Resources/PortKill.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
      gatherCoverageData: false
